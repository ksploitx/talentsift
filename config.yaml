# ============================================================================
# config.yaml — All tunable parameters for the ranking pipeline
# ============================================================================
# Rule: No hardcoded weights, thresholds, or model names in src/.
# Everything tunable lives here.

# Composite score weights for the three scoring pillars.
# Controls how much each pillar contributes to the final candidate score.
# Will be calibrated in Phase 5; leave at 0 until then.
weights:
  retrieval: 0       # Weight for BM25 + dense retrieval relevance score
  structured_fit: 0  # Weight for rule-based structured feature matching (skills, career, experience, location)
  behavioral: 0      # Weight for platform engagement / availability signals (activity, response rate, notice period)

# Number of candidates to include in the final ranked shortlist.
shortlist_size: 100

# Honeypot score threshold above which a candidate is flagged and penalized.
# Candidates scoring above this are considered profile-inconsistency traps.
honeypot_threshold: 0.6

# BM25 retrieval tuning parameters.
# k1: term-frequency saturation; b: document-length normalization.
bm25_params:
  k1: 1.5
  b: 0.75

# Sentence-transformer model used to generate candidate + JD embeddings.
# Must be a HuggingFace model identifier loadable by sentence-transformers.
embedding_model_name: "BAAI/bge-small-en-v1.5"

# Lambda for Maximal Marginal Relevance (MMR) diversity re-ranking.
# 1.0 = pure relevance, 0.0 = pure diversity.
mmr_lambda: 0.5

# Reciprocal Rank Fusion constant (k). Higher k compresses rank differences.
# Standard default from Cormack et al. paper.
rrf_k: 60

# ============================================================================
# Feature extraction thresholds (used by src/features.py)
# ============================================================================

# Maps company_size enum to a numeric score for ranking.
company_size_scores:
  "1-10": 1
  "11-50": 2
  "51-200": 3
  "201-500": 4
  "501-1000": 5
  "1001-5000": 6
  "5001-10000": 7
  "10001+": 8

# Consulting/services firms — entire-career-only triggers a disqualifier flag.
consulting_firms:
  - "TCS"
  - "Infosys"
  - "Wipro"
  - "Accenture"
  - "Cognizant"
  - "Capgemini"
  - "Mindtree"
  - "HCL Technologies"
  - "Tech Mahindra"
  - "LTIMindtree"

# Location tier mapping (keys lowercased for case-insensitive matching).
# tier values: 1 = preferred office city, 2 = nearby metro, 3 = India other, 4 = international
location_tiers:
  "noida": 1
  "pune": 1
  "hyderabad": 2
  "mumbai": 2
  "delhi ncr": 2
  "delhi": 2
  "gurgaon": 2
  "gurugram": 2
  "bangalore": 3
  "bengaluru": 3
  "chennai": 3
  "kolkata": 3
  "ahmedabad": 3
  "jaipur": 3
location_default_india_tier: 3
location_default_international_tier: 4

# Notice period buckets in days — used for scoring.
notice_period_thresholds:
  ideal_max_days: 30
  acceptable_max_days: 60
  long_max_days: 90

# Skill proficiency level weights for counting.
proficiency_weights:
  beginner: 0.25
  intermediate: 0.5
  advanced: 1.0
  expert: 1.5

# Education institution tier scores.
education_tier_scores:
  tier_1: 4
  tier_2: 3
  tier_3: 2
  tier_4: 1
  unknown: 1

# Reference date for computing days_since_active. Set to submission deadline.
reference_date: "2026-06-30"

# Ideal experience range from JD (used for experience fit scoring).
experience_range:
  min_years: 5
  max_years: 9

# Minimum job tenure in months before it counts as "job-hopping".
min_tenure_months: 18

# ============================================================================
# Honeypot detection parameters (used by src/honeypot.py)
# ============================================================================

# Rule 1: Skill proficiency vs duration_months mismatch thresholds.
honeypot_skill_duration_thresholds:
  expert_min_months: 12     # Expert proficiency requires at least this many months
  advanced_min_months: 6    # Advanced proficiency requires at least this many months
  extreme_violation_count: 10  # 10+ violations is maximum suspicion

# Rule 2: Career timeline inconsistency detection.
honeypot_timeline_tolerance_months: 3   # Allow ±3 months date/duration mismatch
honeypot_yoe_divergence_ratio: 2.0      # Flag if total career months > 2x stated YoE
honeypot_max_single_tenure_months: 300  # Flag single tenures > 25 years
honeypot_timeline_max_issues: 3         # 3 issues = maximum timeline penalty

# Rule 3: Non-technical title patterns (substring match, case-insensitive).
honeypot_non_technical_titles:
  - "marketing"
  - "hr "
  - "human resource"
  - "sales"
  - "recruiter"
  - "account manager"
  - "business development"
  - "content writer"
  - "graphic designer"
  - "operations manager"
  - "admin"
  - "receptionist"
  - "coordinator"

# Rule 3: AI/ML keywords for skill stuffing detection (substring match).
honeypot_ai_ml_keywords:
  - "ml"
  - "machine learning"
  - "deep learning"
  - "neural"
  - "nlp"
  - "llm"
  - "transformer"
  - "bert"
  - "gpt"
  - "embedding"
  - "rag"
  - "fine-tun"
  - "pytorch"
  - "tensorflow"
  - "computer vision"
  - "reinforcement learning"
  - "gan"
  - "diffusion"
  - "langchain"
  - "vector database"
  - "lora"

# Rule 3: How many AI/ML skills (advanced+) before max penalty.
honeypot_stuffing_skill_threshold: 3

# Rule 4: Profile completeness vs thin career.
honeypot_completeness_min: 85             # Only check if completeness >= this
honeypot_thin_career_max_entries: 1       # Max career entries to be "thin"
honeypot_thin_career_max_months: 12       # Max total months to be "thin"

# Per-rule weights for combining rule penalties into a single rule score.
honeypot_rule_weights:
  skill_duration_mismatch: 0.30
  career_timeline: 0.30
  title_skill_stuffing: 0.25
  completeness_vs_career: 0.15

# Blend weights for combining rule score and isolation forest score.
honeypot_blend_weights:
  rules: 0.6
  isolation_forest: 0.4

# IsolationForest hyperparameters (used by precompute/build_honeypot_model.py).
honeypot_isolation_forest:
  n_estimators: 200
  contamination: 0.005   # ~0.5% of candidates expected to be honeypots (~80/100k)
  random_state: 42

# Path to the pre-trained IsolationForest model artifact.
honeypot_if_model_path: "precompute/honeypot_iforest.pkl"
