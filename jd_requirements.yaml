# ============================================================================
# JD Requirements Rubric — extracted from docs/job_description.docx
# ============================================================================

must_have_skills:
  - skill: "Production embeddings-based retrieval"
    reasoning: >
      "Production experience with embeddings-based retrieval systems
      (sentence-transformers, OpenAI embeddings, BGE, E5, or similar)
      deployed to real users. We don't care which model — we care that
      you've handled embedding drift, index refresh, retrieval-quality
      regression in production."

  - skill: "Vector databases / hybrid search infrastructure"
    reasoning: >
      "Production experience with vector databases or hybrid search
      infrastructure — Pinecone, Weaviate, Qdrant, Milvus, OpenSearch,
      Elasticsearch, FAISS, or something similar. The specific tech
      doesn't matter; the operational experience does."

  - skill: "Strong Python"
    reasoning: >
      "Yes really, we care about code quality."

  - skill: "Evaluation frameworks for ranking systems"
    reasoning: >
      "Hands-on experience designing evaluation frameworks for ranking
      systems — NDCG, MRR, MAP, offline-to-online correlation, A/B test
      interpretation. If you've never thought about how to evaluate a
      ranking system rigorously, this role will be very painful."

nice_to_have_skills:
  - skill: "LLM fine-tuning (LoRA, QLoRA, PEFT)"
  - skill: "Learning-to-rank models (XGBoost-based or neural)"
  - skill: "HR-tech, recruiting tech, or marketplace products"
  - skill: "Distributed systems or large-scale inference optimization"
  - skill: "Open-source contributions in the AI/ML space"

disqualifiers:
  - rule: "Pure research without production deployment"
    reasoning: >
      "If you've spent your career in pure research environments
      (academic labs, research-only roles) without any production
      deployment — we will not move forward. We are explicit about this.
      We've tried it twice and it didn't work for either side."

  - rule: "Recent LangChain-only AI experience without pre-LLM ML production work"
    reasoning: >
      "If your 'AI experience' consists primarily of recent (under 12
      months) projects using LangChain to call OpenAI — we will probably
      not move forward, unless you can demonstrate substantial
      pre-LLM-era ML production experience."

  - rule: "Senior engineer who hasn't written production code in 18 months"
    reasoning: >
      "If you are a senior engineer who hasn't written production code
      in the last 18 months because you've moved into 'architecture' or
      'tech lead' roles — we will probably not move forward. This role
      writes code."

  - rule: "Title-chasers switching every 1.5 years for title bumps"
    reasoning: >
      "If your career trajectory shows you optimizing for 'Senior' →
      'Staff' → 'Principal' titles by switching companies every 1.5
      years, we're not a fit. We need someone who plans to be here for
      3+ years."

  - rule: "Framework enthusiasts (LangChain tutorials, hot-framework demos)"
    reasoning: >
      "If your GitHub is full of LangChain tutorials and your blog posts
      are 'How I used [hot framework] to build [demo]' — that's fine but
      it's not what we need. We need people who think about systems, not
      frameworks."

  - rule: "Entire career at consulting firms without product-company experience"
    reasoning: >
      "People who have only worked at consulting firms (TCS, Infosys,
      Wipro, Accenture, Cognizant, Capgemini, etc.) in their entire
      career. We've had bad fit experiences in both directions. If
      you're currently at one but have prior product-company experience,
      that's fine."

  - rule: "Primary expertise in CV/speech/robotics without NLP/IR exposure"
    reasoning: >
      "People whose primary expertise is computer vision, speech, or
      robotics without significant NLP/IR exposure. We respect your work
      but you'd be re-learning fundamentals here."

  - rule: "5+ years on closed-source proprietary systems without external validation"
    reasoning: >
      "People whose work has been entirely on closed-source proprietary
      systems for 5+ years without external validation (papers, talks,
      open-source). We need to see how you think, not just trust that
      you can think."

ideal_years_experience:
  min: 5
  max: 9
  ideal_range: "6-8 years total, 4-5 in applied ML/AI at product companies"
  reasoning: >
    "This is a range, not a requirement. Some people hit 'senior
    engineer' judgment at 4 years; some never hit it after 15. We've
    used 5-9 because it's roughly where people we've hired into this
    kind of role have landed, but we'll seriously consider candidates
    outside the band if other signals are strong."

preferred_locations:
  tier_1:
    - "Noida"
    - "Pune"
  tier_2:
    - "Hyderabad"
    - "Mumbai"
    - "Delhi NCR"
  reasoning: >
    "Offices in Noida and Pune (mostly used Tue/Thu). Candidates in
    Hyderabad, Pune, Mumbai, Delhi NCR welcome to apply. Outside India:
    case-by-case, but we don't sponsor work visas."

preferred_company_types:
  - "Product companies (fintech, edtech, healthtech, SaaS, etc.)"
  reasoning: >
    "The 'ideal candidate' has 6-8 years total experience, of which 4-5
    are in applied ML/AI roles at product companies (not pure services)."

excluded_company_types:
  - "Pure consulting/services (TCS, Infosys, Wipro, Accenture, Cognizant, Capgemini) — if entire career"
  reasoning: >
    "We've had bad fit experiences in both directions."

notice_period:
  preferred_max_days: 30
  reasoning: >
    "We'd love sub-30-day notice. We can buy out up to 30 days. 30+ day
    notice candidates are still in scope but the bar gets higher."

behavioral_priorities:
  - priority: "Active on platform / in the job market"
    reasoning: >
      "A perfect-on-paper candidate who hasn't logged in for 6 months
      and has a 5% recruiter response rate is, for hiring purposes, not
      actually available. Down-weight them appropriately."

  - priority: "Shipped end-to-end ranking/search/recommendation system"
    reasoning: >
      "Has shipped at least one end-to-end ranking, search, or
      recommendation system to real users at meaningful scale."

  - priority: "Strong opinions about retrieval, evaluation, LLM integration"
    reasoning: >
      "Has strong opinions about retrieval (hybrid vs dense), evaluation
      (offline vs online), and LLM integration (when to fine-tune vs
      prompt) — and can defend them with reference to systems they
      actually built."

  - priority: "Substance over keywords"
    reasoning: >
      "The 'right answer' is not 'find candidates whose skills section
      contains the most AI keywords.' A Tier 5 candidate may not use
      the words 'RAG' or 'Pinecone' in their profile, but if their
      career history shows they built a recommendation system at a
      product company, they're a fit."
